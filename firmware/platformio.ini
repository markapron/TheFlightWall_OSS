[env:adafruit_matrix_portal_m4]
platform = atmelsam
board = adafruit_matrix_portal_m4
framework = arduino
test_framework = unity
test_build_src = true
monitor_speed = 115200

lib_deps =
    fastled/FastLED @ ^3.6.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    marcmerlin/FastLED NeoMatrix @ ^1.2
    bblanchon/ArduinoJson @ ^7.4.2
    arduino-libraries/ArduinoHttpClient @ ^0.6.1
    # Use Adafruit's specific fork of WiFiNINA for AirLift modules
     https://github.com/adafruit/WiFiNINA.git
    # Required for the Matrix Portal's hardware
    adafruit/Adafruit Protomatter @ ^1.7.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.16.0
    # Flash-based EEPROM emulation for persistent config on SAMD51
    khoih-prog/FlashStorage_SAMD @ ^1.3.2

lib_ldf_mode = deep+

build_src_filter =
    +<*.cpp>
    +<**/*.cpp>
    +<../adapters/*.cpp>
    +<../core/*.cpp>
    +<../utils/*.cpp>

build_flags =
    -I .
    -I include
    -I src
    -I adapters
    -I core
    -I models
    -I interfaces
    -I utils
    -I config
    -DFASTLED_USES_ARDUINO_AUDIO_INPUT=0
    -DFLIGHTWALL_DISPLAY_PROTOMATTER=1
    ; Uncomment to bypass TLS (use plain HTTP) for network testing while cert upload is unresolved
    ; -DFLIGHTWALL_SKIP_TLS=1

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    fastled/FastLED @ ^3.6.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    marcmerlin/FastLED NeoMatrix @ ^1.2
    bblanchon/ArduinoJson @ ^7.4.2
    arduino-libraries/ArduinoHttpClient @ ^0.6.1

lib_ldf_mode = deep+

build_src_filter =
    +<*.cpp>
    +<**/*.cpp>
    +<../adapters/*.cpp>
    +<../core/*.cpp>
    +<../utils/*.cpp>

build_flags =
    -I .
    -I include
    -I src
    -I adapters
    -I core
    -I models
    -I interfaces
    -I utils
    -I config
    -DFASTLED_USES_ARDUINO_AUDIO_INPUT=0
    -DFLIGHTWALL_DISPLAY_NEOMATRIX=1
    -DFLIGHTWALL_NEOMATRIX_DATA_PIN=5